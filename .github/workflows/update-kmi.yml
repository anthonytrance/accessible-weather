name: Refresh KMI observations

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kmi-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest KMI observations
        run: npm run update-kmi
      - name: Commit changed observations
        shell: bash
        run: |
          if git diff --quiet -- data/kmi-latest.json; then
            echo "KMI data is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kmi-latest.json
          git commit -m "Update KMI observations"
          git push
